version: "3.9"

services:
  api:
    build:
      context: .
      target: production
    image: agent-execution-engine:latest
    env_file:
      - .env
    command: ["node", "dist/server.js"]
    ports:
      - "${PORT}:${PORT}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${PORT}/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net

  worker:
    image: agent-execution-engine:latest
    depends_on:
      - api
    env_file:
      - .env
    command: ["node", "dist/worker.js"]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
